# Cloud Build → Artifact Registry → Cloud Run.
#
# One command from a local shell authed as you:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=reos,_SERVICE=reos
#
# Assumptions (set up once before the first build):
#   - Artifact Registry repo `_REPO` exists in `_REGION`
#   - Cloud Run service `_SERVICE` exists in `_REGION` (can be empty
#     the first time — `gcloud run deploy` creates it)
#   - Secret Manager has every key listed in `set-secrets` below
#   - Cloud SQL or Neon connection string is in DATABASE_URL secret
#   - The Cloud Run service account has:
#       roles/secretmanager.secretAccessor
#       roles/cloudsql.client  (if using Cloud SQL)
steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=2
      - --timeout=300
      - --set-env-vars=NODE_ENV=production,AUTH_TRUST_HOST=true
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,AUTH_URL=AUTH_URL:latest,AUTH_ALLOWED_EMAILS=AUTH_ALLOWED_EMAILS:latest,AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest,AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GOOGLE_REDIRECT_URI=GOOGLE_REDIRECT_URI:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,OWNER_EMAIL_ALIASES=OWNER_EMAIL_ALIASES:latest,SCAN_SCHEDULE_SECRET=SCAN_SCHEDULE_SECRET:latest,NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest

substitutions:
  _REGION: us-central1
  _REPO: reos
  _SERVICE: reos
  # _TAG defaults to "latest" for manual `gcloud builds submit`. When
  # firing from a Git trigger, override with the commit sha:
  #   --substitutions=_TAG=$(git rev-parse --short HEAD)
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
