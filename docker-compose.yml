services:
  postgres:
    image: postgres:16-alpine
    container_name: reos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reos
      POSTGRES_PASSWORD: reos
      POSTGRES_DB: real_estate_os
    ports:
      - "5433:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reos -d real_estate_os"]
      interval: 5s
      timeout: 5s
      retries: 10
